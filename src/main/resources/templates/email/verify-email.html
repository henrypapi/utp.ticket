<!doctype html>
<html lang="es">
<head><meta charset="UTF-8"><title>Verifica tu correo</title></head>
<body style="font-family:Arial,Helvetica,sans-serif">
<div style="max-width:560px;margin:auto;padding:24px;border:1px solid #eee;border-radius:12px">
    <p style="margin:0 0 12px"><img src="cid:logo" alt="Lim-On" style="height:28px"/></p>
    <h2 style="margin:0 0 10px">Verifica tu correo</h2>
    <p>Hola <span th:text="${fullName}">Usuario</span>,</p>
    <p>Tu código es <b th:text="${code}">123456</b>. Caduca en <span th:text="${ttlMin}">5</span> minutos.</p>
    <p style="color:#666;font-size:12px;margin-top:24px">Si no solicitaste este correo, ignóralo.</p>
</div>
</body>
</html>
